name: Validate pull request

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Build for a root deployment
        run: npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}
      - name: Build for GitHub Pages
        run: npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}
          VITE_BASE: /ancient-lexicon/
      - name: Verify generated artifacts are committed
        run: |
          npm run data:build
          git diff --exit-code
